  /locations:
    get:
      tags:
        - Syndication
        - Location
      summary: Get Locations
      description: 'Retrieve a list of locations. Locations are sites where a Provider operates. Query parameters may be added to the URL which are filters so that the response will only include organisations with attributes matching the required value(s). The available filters are listed in the "Query parameters" section below. If the same query parameter is repeated in the URL with different values organisations will be returned which match any of the values. If there are combinations of different query parameters, e.g. region and overallRating, then organisations which match both sets of values are returned. For example, /locations?region=London&region=South%20west&overallRating=Outstanding will return organisations which have a current "Outstanding" overall rating and which have a region of "London" or "South west".'
      operationId: get-locations
      parameters:
        - name: careHome
          in: query
          description: Include only locations where the value of the attribute careHome matches one of the values of this parameter (Y or N). See method description for how to use search parameters.
          schema:
            type: string
        - name: onspdCcgCode
          in: query
          description: Include only locations where the ONSPD CCG code (onspdCcgCode) of the geographic area covering the Location's postcode matches one of the values of this parameter. See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: onspdCcgName
          in: query
          description: Include only locations where the ONSPD CCG name (onspdCcgName) of the geographic area covering the Location's postcode matches one of the values of this parameter. See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: odsCcgCode
          in: query
          description: Include only locations where the ODS code (odsCcgCode) of the CCG selected by this organisation is known and matches one of the values of this parameter. See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: odsCcgName
          in: query
          description: Include only locations where the ODS name (odsCcgName) of the CCG selected by this organisation is known and matches one of the values of this parameter. See method description for more on using search parameters.
          schema:
            type: array
            items:
