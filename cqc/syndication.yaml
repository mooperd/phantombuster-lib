  '/changes/{organisationType}':
    get:
      tags:
        - Syndication
        - Changes
      summary: Get Changes Within Timeframe
      description: "The Changes service provides a mechanism of staying informed about updates to providers and locations, to allow users to refresh their cached data if necessary. Changes for two organisation types are available: provider or location. API consumers must specify a start and end date range, see the API reference for more detail. This service allows identification of which organisations have changed over time. For successive calls to this service, the startTime parameter should be set to the endTime of the previous call. The times correspond to the time that this service itself acquires the data and is not, for example, the time of data entry onto a source system.\n\nGrants ability to retrieve a list of organisations of the given type that have changed in given timeframe."
      operationId: get-changes-within-timeframe
      parameters:
        - name: organisationType
          in: path
          description: The type of object for which to get a list of changes. Allowed values are location or provider.
          required: true
          schema:
            enum:
              - location
              - provider
            type: string
          examples:
            organisationType:
              value: location or provider
        - name: startTimestamp
          in: query
          description: ISO 8601 timestamp. The period is inclusive of the start time.
          required: true
          schema:
            type: string
          examples:
            startTimestamp:
              value: '2024-01-01T12:00:00.0000000+00:00'
        - name: endTimestamp
          in: query
          description: 'ISO 8601 timestamp for the end of the time period. The period is exclusive of the end time, so only changes before this time are included.'
          required: true
          schema:
            type: string
          examples:
            endTimestamp:
              value: '2024-01-15T12:00:00.0000000+00:00'
        - name: page
          in: query
          description: The page to be returned.
          schema:
            type: integer
          examples:
            page:
              value: 1
        - name: perPage
          in: query
          description: 'The number of items to return, per page.'
          schema:
            type: integer
          examples:
            perPage:
              value: 50
      responses:
        '200':
          description: A list of changes to Providers or Locations
          content:
            application/json:
              example:
                total: 1
                page: 1
                totalPages: 1
                perPage: 10
                previousPageUri: 
                nextPageUri: 
                firstPageUri: /changes/location?page=1&perPage=10&startTimestamp=2015-01-01T02:33:20Z&endTimestamp=2015-02-01T02:33:20Z
                lastPageUri: /changes/location?page=1&perPage=10&startTimestamp=2015-01-01T02:33:20Z&endTimestamp=2015-02-01T02:33:20Z
                changes:
                  - 1-293028586
                uri: /changes/location
        '400':
          description: An error response.
          content:
            application/json:
              example:
                message: Bad Request
        '500':
          description: An error response.
          content:
            application/json:
              example:
                message: Internal server error.
  /providers:
    get:
      tags:
        - Syndication
        - Provider
      summary: Get Providers
      description: 'Retrieve the list of providers. Providers are organisations that carry out health and social care services, and are regulated by CQC. Query parameters may be added to the URL which are filters so that the response will only include organisations with attributes matching the required value(s). The available filters are listed in the "Query parameters" section below. If the same query parameter is repeated in the URL with different values organisations will be returned which match any of the values. If there are combinations of different query parameters, e.g. region and overallRating, then organisations which match both sets of values are returned. For example, /providers?region=London&region=South%20west&overallRating=Outstanding will return organisations which have a current "Outstanding" overall rating and which have a region of "London" or "South west".'
      operationId: get-providers
      parameters:
        - name: constituency
          in: query
          description: Include only organisations with a Constituency (constituency attribute) matching one of the values of this parameter. e.g "Greenwich" See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: localAuthority
          in: query
          description: Include only organisations with a Local Authority (localAuthority attribute) matching one of the values of this parameter. e.g. "Merton" See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: inspectionDirectorate
          in: query
          description: Include only organisations with a Inspection Directorate (inspectionDirectorate attribute) matching one of the values of this parameter. e.g. "Hospitals" See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: nonPrimaryInspectionCategoryCode
          in: query
          description: Include only organisations with a Non-Primary Inspection Category Code (inspectionCategories.code attribute where inspectionCategories.primary="N") matching one of the values of this parameter. e.g. "H2". See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: nonPrimaryInspectionCategoryName
          in: query
          description: Include only organisations with a Non-Primary Inspection Category Name (inspectionCategories.name attribute where inspectionCategories.primary="N") matching one of the values of this parameter. e.g. "Acute hospital - NHS specialist". e.g. "Acute hospital - NHS specialist" See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: primaryInspectionCategoryCode
          in: query
          description: Include only organisations with a Primary Inspection Category Code (inspectionCategories.code attribute where inspectionCategories.primary="Y") matching one of the values of this parameter. e.g. "H2". See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: primaryInspectionCategoryName
          in: query
          description: Include only organisations with a Primary Inspection Category Name (inspectionCategories.name attribute where inspectionCategories.primary="Y") matching one of the values of this parameter. e.g. "Acute hospital - NHS specialist". See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: overallRating
          in: query
          description: Include only organisations with a Current Overall Rating (currentRatings.overall.rating attribute) matching one of the values of this parameter. e.g. "Good" See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: region
          in: query
          description: Include only organisations with a Region (region attribute) matching one of the values of this parameter. e.g. "London" See method description above for more on using search parameters.
          schema:
            type: array
            items:
              type: string
        - name: regulatedActivity
          in: query
          description: 'Include only organisations with a Regulated Activity (regulatedActivities.name attribute) e.g. "Maternity and midwifery services", matching one of the values of this parameter. See method description above for more on using search parameters.'
          schema:
            type: array
            items:
              type: string
        - name: reportType
          in: query
          description: 'Include only organisations with a Report Type (attribute) matching one of the values of this parameter. e.g. "Location", "Provider" or "CoreService". See method description above for more on using search parameters.'
