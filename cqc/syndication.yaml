openapi: 3.0.1
info:
  title: Syndication
  description: "CQC Syndication API provides details about the services and data accessible through this API, along with information that will show you how to begin integration with your platform.\nCQC Syndication is a collection of REST APIs that exposes the ability for customers and providers to provider interactions into CQCs systems and processes."
  version: '1.0'
servers:
  - url: https://api.service.cqc.org.uk/public/v1
  - url: https://api-management.service.cqc.org.uk/public/v1
paths:
