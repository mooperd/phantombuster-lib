      summary: Get Location Inspection Areas
      description: 'Retrieve the list of Inspection Areas which have been inspected at this organisation excluding any that may have been globally retired (covering services no longer inspected by CQC). Although an Inspection area may be Superseded globally for the purpose of new inspections, it will remain active (along with the ratings for that area) at a given organisation until it has been re-inspected under the superseding inspection area(s).'
      operationId: get-location-inspection-areas
      parameters:
        - name: id
          in: path
          description: The organisation The organisation Id of the location.
          required: true
          schema:
            type: string
          examples:
            id:
              value: 1-1023565868
      responses:
        '200':
          description: "Inspection Areas.\n\nThe list of Inspection areas covered by services which have been inspected at the organisation. Inspection areas include services and population groups."
          content:
            application/json:
              example:
                inspectionAreas:
                  - inspectionAreaId: accident
                    inspectionAreaName: Urgent care centre
                    status: Inactive
                    endDate: '2020-12-31'
                  - inspectionAreaId: independentmaternity
                    inspectionAreaName: Maternity
                    status: Active (Rated)
                  - inspectionAreaId: maternity
                    inspectionAreaName: Maternity and gynaecology
                    status: Superseded
                    supersededBy:
                      - independentmaternity
        '400':
          description: An error response.
          content:
            application/json:
              example:
                message: Bad Request
        '404':
          description: An error response.
          content:
            application/json:
              example:
                message: Not found
        '500':
          description: An error response.
          content:
            application/json:
              example:
                message: Internal server error.
