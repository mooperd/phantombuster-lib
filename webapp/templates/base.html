<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Phantombuster Control{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">
        <i class="bi bi-robot"></i> Phantombuster Control
      </a>
      <div class="navbar-nav">
        <a class="nav-link {{ 'active' if active == 'dashboard' }}" href="{{ url_for('dashboard.index') }}">Dashboard</a>
        <a class="nav-link {{ 'active' if active == 'agents' }}" href="{{ url_for('agents.index') }}">Agents</a>
        <a class="nav-link {{ 'active' if active == 'resolve' }}" href="{{ url_for('resolve.page') }}">CQC → LinkedIn</a>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
