{% extends "base.html" %}
{% block title %}Error · Phantombuster Control{% endblock %}
{% block content %}
<div class="alert alert-danger">
  <h4 class="alert-heading">Phantombuster API error</h4>
  <p class="mb-1">{{ error }}</p>
  {% if error.endpoint %}<p class="mb-0 small">Endpoint: <code>{{ error.endpoint }}</code></p>{% endif %}
</div>
<a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">Back to dashboard</a>
{% endblock %}
