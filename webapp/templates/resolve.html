{% extends "base.html" %}
{% block title %}CQC → LinkedIn · Phantombuster Control{% endblock %}

{% block content %}
<h1 class="h3 mb-4">CQC → LinkedIn resolver</h1>

<form id="resolveForm" class="row g-2 mb-4">
  <div class="col-auto">
    <input type="text" id="cqcId" class="form-control" placeholder="CQC provider id, e.g. 1-116865921" value="1-116865921" size="34">
  </div>
  <div class="col-auto">
    <button type="submit" class="btn btn-primary">Resolve</button>
  </div>
  <div class="col-auto d-flex align-items-center">
    <span id="state" class="badge bg-secondary d-none"></span>
  </div>
</form>

<div class="row g-4">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header fw-semibold">CQC data</div>
      <div class="card-body p-0">
        <pre id="cqcOut" class="mb-0 p-3 overflow-auto">—</pre>
      </div>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card mb-3">
      <div class="card-header fw-semibold">LinkedIn match</div>
      <div class="card-body p-0">
        <pre id="liOut" class="mb-0 p-3 overflow-auto">—</pre>
      </div>
    </div>
    <div class="card">
      <div class="card-header fw-semibold">Job (Phantombuster container)</div>
      <div class="card-body p-0">
        <pre id="jobOut" class="mb-0 p-3 overflow-auto">—</pre>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const form = document.getElementById("resolveForm")
  const stateEl = document.getElementById("state")
  const cqcOut = document.getElementById("cqcOut")
  const liOut = document.getElementById("liOut")
  const jobOut = document.getElementById("jobOut")
  const show = (el, obj) => { el.textContent = JSON.stringify(obj, null, 2) }
  const setState = (s, cls) => { stateEl.className = "badge " + cls; stateEl.textContent = s; stateEl.classList.remove("d-none") }

  let timer = null
  form.addEventListener("submit", async (e) => {
    e.preventDefault()
    if (timer) clearInterval(timer)
    liOut.textContent = "—"; jobOut.textContent = "—"
    setState("resolving CQC…", "bg-info text-dark")
    const res = await fetch("/api/resolve", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cqc_id: document.getElementById("cqcId").value.trim() })
    })
    const data = await res.json()
    if (!res.ok) { setState("error", "bg-danger"); show(cqcOut, data); return }
    show(cqcOut, data.cqc)
    if (data.skipped) {
      setState("skipped", "bg-warning text-dark")
      show(liOut, { skipped: true, reason: data.reason })
      return
    }
    setState("running (" + data.search_term + ")", "bg-primary")

    timer = setInterval(async () => {
      const j = await (await fetch(data.job_url)).json()
      show(jobOut, j.container)
      if (j.linkedin) show(liOut, j.linkedin)
      if (j.state !== "running") {
        clearInterval(timer)
        setState(j.state, j.state === "finished" ? "bg-success" : "bg-danger")
        if (!j.linkedin) show(liOut, { note: "no LinkedIn match", results: j.results })
      }
    }, 3000)
  })
</script>
{% endblock %}
